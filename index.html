<CTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedilhado Flauta Doce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Dedilhado de Flauta Doce</h1>
            <button id="toggleNames">Mudar para: Dó, Ré, Mi</button>
        </header>

        <main>
            <div id="noteGrid" class="grid-container">
                </div>

            <div id="displayArea" class="display-card">
                <h2 id="currentNoteName">Selecione uma nota</h2>
                <div class="image-placeholder">
                    <img id="fingeringImage" src="placeholder.png" alt="Desenho do dedilhado">
                </div>
                <div class="numerical-info">
                    <h3>Digitação:</h3>
                    <p id="fingeringNumbers">-</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
